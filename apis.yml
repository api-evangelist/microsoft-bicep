  - type: VS Code Extension
    url: https://marketplace.visualstudio.com/items?itemName=ms-azuretools.vscode-bicep
- name: Bicep Deployments REST API
  description: >-
    Azure Resource Manager Deployments REST API used by Microsoft Bicep
    to deploy infrastructure as code templates. Provides operations for
    creating, validating, and managing ARM/Bicep template deployments at
    resource group, subscription, management group, and tenant scopes.
  baseURL: https://management.azure.com
  humanURL: https://learn.microsoft.com/en-us/rest/api/resources/deployments
  properties:
  - type: Documentation
    url: https://learn.microsoft.com/en-us/rest/api/resources/deployments
  - type: OpenAPI
    url: openapi/microsoft-bicep-deployments-openapi.yml
  - type: Authentication
    url: https://learn.microsoft.com/en-us/azure/azure-resource-manager/management/authenticate-multi-tenant
- name: Bicep Template Specs REST API
  description: >-
    Azure Resource Manager Template Specs REST API used by Microsoft Bicep
    for publishing and managing reusable infrastructure templates. Template
    Specs allow you to store ARM/Bicep templates as Azure resources for
    versioning, sharing, and access control across your organization.
  baseURL: https://management.azure.com
  humanURL: https://learn.microsoft.com/en-us/rest/api/resources/template-specs
  properties:
  - type: Documentation
    url: https://learn.microsoft.com/en-us/rest/api/resources/template-specs
  - type: OpenAPI
    url: openapi/microsoft-bicep-template-specs-openapi.yml
  - type: Authentication
    url: https://learn.microsoft.com/en-us/azure/azure-resource-manager/management/authenticate-multi-tenant
