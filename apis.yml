name: Microsoft Bicep
description: >-
  Microsoft Bicep is a domain-specific language (DSL) that uses declarative
  syntax to deploy Azure resources. It provides a transparent abstraction
  over ARM templates and offers a more concise syntax, improved type safety,
  and better support for modularity and code reuse.
image: https://docs.microsoft.com/en-us/azure/azure-resource-manager/bicep/media/bicep-logo.png
url: https://github.com/Azure/bicep
created: '2024-01-15'
modified: '2026-03-16'
